<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>10-K Finance Agent</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-logo">10-K Analyst</div>
    <span class="header-sub">/ Agentic Finance Intelligence</span>
    <div class="header-right">
      <span class="model-badge">groq / gpt-oss-120b</span>
    </div>
  </header>

  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Upload 10-K Report</div>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept=".pdf" multiple />
        <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin: 0 auto 8px; display: block;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m6.75 12l-3-3m0 0l-3 3m3-3v6m-1.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
        </svg>
        <p><strong>Click or drag</strong> PDF here</p>
      </div>
      <div class="progress-bar" id="progress-bar" style="display:none">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <p class="progress-text" id="progress-text"></p>
    </div>

    <div class="sidebar-section" id="docs-section" style="display:none">
      <div class="sidebar-label">Loaded Documents</div>
      <div id="doc-list"></div>
    </div>

    <div class="sidebar-section" id="stats-section" style="display:none">
      <div class="sidebar-label">Document Stats</div>
      <div class="stat-grid" id="stats-grid"></div>
    </div>
    
    <div class="sidebar-section">
      <div class="sidebar-label">Quick Analysis</div>
      <button class="quick-prompt" onclick="sendQuick('Give me a comprehensive financial summary including revenue, profit margins, and YoY growth')"><span class="quick-prompt-icon">📊</span>Financial Summary</button>
      <button class="quick-prompt" onclick="sendQuick('Extract all key financial metrics in a table: Revenue, Net Income, EPS, Total Assets, Total Liabilities, Cash flow from operations')"><span class="quick-prompt-icon">📋</span>Key Metrics Table</button>
      <button class="quick-prompt" onclick="sendQuick('Plot a bar chart showing revenue and net income for all available years. Include exact values.')"><span class="quick-prompt-icon">📈</span>Revenue & Income Chart</button>
    </div>
  </aside>

  <main class="chat-area">
    <div class="chat-toolbar">
      <button class="toolbar-btn active" id="btn-chat" onclick="setMode('chat')">Chat</button>
      <button class="toolbar-btn" id="btn-extract" onclick="setMode('extract')">Extract Tables</button>
      <button class="toolbar-btn" id="btn-compare" onclick="setMode('compare')">Compare</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" onclick="clearChat()">Clear</button>
      <div class="toolbar-right" id="token-info">No document loaded</div>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">📑</div>
        <div class="empty-title">Upload a 10-K to begin</div>
        <div class="empty-sub">I'll extract text and tables, then answer your questions with full financial intelligence.</div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="chat-input" rows="1" placeholder="Ask about financials, request a chart, extract tables…" disabled></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" /></svg>
        </button>
      </div>
    </div>
  </main>
</div>

<div class="notif" id="notif"></div>
<script src="app.js"></script>
</body>
</html>
